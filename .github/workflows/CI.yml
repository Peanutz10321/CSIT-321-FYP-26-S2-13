name: CI - Run Tests

on:
  push:
    branches: ["main", "refactor/**"]
  pull_request:
    branches: ["main"]

  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment Environment'
        required: true
        default: 'production'
        type: string

jobs:
  backend:
    runs-on: ubuntu-latest

    # Migration and constraint behaviour cannot be verified on SQLite, so the
    # backend job gets a throwaway PostgreSQL instance.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: evoting_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./test.db
          JWT_SECRET: test
          JWT_ALGORITHM: HS256
          # Throwaway Fernet key for tests only — real one lives in .env
          KEYSTORE_MASTER_SECRET: odLNbv3Y2g1epq7Q-qRgM2riovLBiRnrp7KAEGjKujs=
          TESTING: "true"
          # Throwaway database for the migration/constraint tests, which cannot
          # run on SQLite. Without this they skip.
          TEST_POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/evoting_test
          # Required by the fail-closed guard before tests drop the public schema.
          ALLOW_DESTRUCTIVE_DB_TESTS: "true"
        run: pytest tests -v

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
